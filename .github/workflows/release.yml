name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package: binary
            source_path: target/x86_64-unknown-linux-gnu/release/mongo_db_migrator
            asset_name: mongo_db_migrator-linux-x64
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            package: binary
            source_path: target/x86_64-pc-windows-msvc/release/mongo_db_migrator.exe
            asset_name: mongo_db_migrator-windows-x64.exe
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            package: binary
            source_path: target/x86_64-apple-darwin/release/mongo_db_migrator
            asset_name: mongo_db_migrator-macos-x64
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            package: binary
            source_path: target/aarch64-apple-darwin/release/mongo_db_migrator
            asset_name: mongo_db_migrator-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build release binary
        if: matrix.package == 'binary'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.source_path }}" "dist/${{ matrix.asset_name }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" release-assets/* --repo "$REPO" --title "$TAG" --generate-notes
          fi
